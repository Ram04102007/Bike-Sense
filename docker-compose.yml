version: "3.9"

services:
  # ─── PostgreSQL Database ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bikesense-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       bikesense
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: bikesense_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI ML Service ───────────────────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: bikesense-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATA_PATH: /app/data/bike_data.csv
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Next.js Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ML_API_URL: http://ml-service:8000
    container_name: bikesense-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL:          postgresql://postgres:bikesense_secret@postgres:5432/bikesense
      ML_API_URL:            http://ml-service:8000
      NEXT_PUBLIC_ML_API_URL: http://localhost:8000
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_healthy

  # ─── Nginx Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: bikesense-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - ml-service

volumes:
  postgres_data:
